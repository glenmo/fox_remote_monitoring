# Fox ESS Monitor — Apache 2 reverse-proxy vhost
# Copies to /etc/apache2/sites-available/fox-monitor.conf
# Enable with:  sudo a2ensite fox-monitor.conf

<VirtualHost *:80>
    ServerName  desky.local
    ServerAlias 192.168.55.33

    # Reverse proxy to the Flask backend bound to 127.0.0.1:5000
    ProxyPreserveHost On
    ProxyRequests     Off
    ProxyPass        / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # Make sure browsers don't cache API responses
    <LocationMatch "^/api/">
        Header set Cache-Control "no-store, no-cache, must-revalidate"
    </LocationMatch>

    ErrorLog  ${APACHE_LOG_DIR}/fox-monitor-error.log
    CustomLog ${APACHE_LOG_DIR}/fox-monitor-access.log combined
</VirtualHost>
